<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <title>HR-RAG System</title>

  <style>
    body {
      font-family: Arial;
      margin: 40px;
      background: #f4f4f4;
    }

    h1 {
      color: #333;
    }

    form {
      margin-bottom: 30px;
    }

    input[type="text"] {
      width: 70%;
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
    }

    .result {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
    }
  </style>

</head>

<body>

  <h1>Multi-Domain RAG System</h1>

  <form method="POST">

    <input type="text" name="query" placeholder="Enter your query..." value="{{ query }}" required>

    <button type="submit">
      Search
    </button>

  </form>

  {% for r in results %}

  <div class="result">

    <h3>
      Domain: {{ r.domain }}
    </h3>

    <p>
      <strong>Distance:</strong>
      {{ r.distance }}
    </p>

    <p>
      {{ r.text }}
    </p>

  </div>

  {% endfor %}

</body>

</html>
